<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <script>
        //Conditional statement:-Javascript uses conditional statements taki decision le sake , jsse run hoat ahi different block lof code jo ki based hota hai true or false pr
        //if... condition
        let age=33;
       /* if (age>=18){
            console.log("valid age for vote casting!");
        } */
         //if....else
         if(age>=18){
            console.log("Valid Age");

         }
         else{
            console.log("Not valid age");

         }
         //switchcase.......
         let grade='A';
         switch(grade){
            case 'A': result="First Division";
              break;
            case 'B': result="Second  Division";
              break;
            case 'C': result="Third Division";
              break;
            default: result="Fail";
         }
        console.log(result);
        //elseif else......
        let marks =30;
        if(marks>=60){
            console.log("First Division Marks");
        }
        else if(marks<60 && marks>=40){
            console.log("Second Division Marks");
        }
        else if(marks<40 && marks>=33){
            console.log("Third Division Marks");
        }
        else{
            console.log("Fail");
        }
    </script>
    
</body>
</html>
