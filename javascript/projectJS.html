<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avg of array</title>
</head>

<body>

<script>
let arr = [10,20,30,40,50];
let sum = 0;

for(let i=0;i<arr.length;i++){
    sum = sum + arr[i];
}

let avg = sum / arr.length;

console.log("Sum = " + sum);
console.log("Average = " + avg);
</script>

</body>
</html>
