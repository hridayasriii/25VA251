<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var score=prompt("enter your score to know grade");
        if(score>=90&&score<=100){
            console.log("Grade: A");
        }
        else if(score>=70&&score<=89){
            console.log("Grade: B");
        }
        else if(score>=60&&score<=69){
            console.log("Grade: C");
        }
        else if(score>=50&&score<=59){
            console.log("Grade: D");
        }
        else{
            console.log("Fail");
        }
    </script>
    
</body>
</html>
