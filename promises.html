<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promises</title>
</head>
<body>
    <script>
        let myPromises=new Promise (function(resolve,reject) {
            let age=20;
            if(age>=18){
                resolve("vailid age");
            }
            else{
                reject("wait for next year");
            }
        });
        myPromises
        .then(result=>console.log(result))
        .catch(error=>console.log(error))
        .finally(console.log("done"));

        // asyncronas
        async function userData(){
            let respnse=await fetch('https://fakestoreapi.com/products/1');
            let responsData=await respnse.json();
            console.log(responsData);
        }
        // api details
        async function userData(){
            try{
            let respnse=await fetch('https://fakestoreapi.com/products/1');
            let responsData=await respnse.json();
            console.log(responsData);
        }
        catch (error){
            console.log(error);
        }
    }    userData();

    </script>
    
</body>
</html>
